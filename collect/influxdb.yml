apiVersion: 1

datasources:
  - name: InfluxDB-RAN
    uid: influxdb-ran
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: ${GF_INFLUXDB_ORG}
      defaultBucket: ${GF_INFLUXDB_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: ${GF_INFLUXDB_TOKEN}
    editable: true
