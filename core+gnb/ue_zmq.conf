# ue_zmq.conf — srsUE config using ZeroMQ, matching gnb_zmq.yaml's ports.
#
# Before running srsUE, you MUST register a matching subscriber in Open5GS's
# WebUI (default: http://<open5gs-host>:9999, login admin/1423) using the
# SAME imsi/key/opc values as below. Without that, the AMF will reject the
# UE's attach request every time.

[rf]
device_name = zmq
device_args = tx_port=tcp://127.0.0.1:2001,rx_port=tcp://127.0.0.1:2000,id=ue,base_srate=23.04e6
srate = 23.04e6
tx_gain = 0
rx_gain = 0

[rat.eutra]
dl_earfcn = 3350
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106

[pcap]
enable = none

[log]
all_level = warning
filename = /tmp/srsue.log

[usim]
mode = soft
algo = milenage
opc  = 63bfa50ee6523365ff14c1f45f88737d
k    = 00112233445566778899aabbccddeeff
imsi = 001010123456789
imei = 353490069873319

[rrc]
release = 15

[nas]
apn = internet
apn_protocol = ipv4
